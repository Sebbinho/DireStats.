name: Build Android APK

on:
  push:
    branches: [ main ] # Si attiva quando fai push sul ramo "main"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Configura Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Installa le dipendenze
      run: npm ci

    - name: Compila il sito (Vite Build)
      run: npm run build

    - name: Sincronizza Capacitor
      run: |
        npx cap sync android

    - name: Configura Java (richiesto per compilare l'APK)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Compila l'APK (Gradle)
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Carica l'APK generato
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk